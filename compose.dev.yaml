services:
  labtorio:
    image: node:24-trixie-slim
    working_dir: /app
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 8080 --strictPort"
    environment:
      LABTORIO_HMR_HOST: labtorio.tyrode.dev
      LABTORIO_HMR_CLIENT_PORT: "443"
      VITE_CACHE_DIR: /app-cache/vite
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - vite_cache:/app-cache/vite

volumes:
  node_modules:
  vite_cache:
